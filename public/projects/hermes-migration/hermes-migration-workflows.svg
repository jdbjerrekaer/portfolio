<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes workflow map</title>
  <desc id="desc">Five workflow cards connected to a central Hermes orchestration layer.</desc>
  <rect width="1600" height="900" rx="36" fill="#0d1727"/>
  <text x="100" y="105" fill="#f2f7ff" font-family="Inter,Arial,sans-serif" font-size="45" font-weight="750">One orchestration layer, several bounded workflows</text>
  <text x="100" y="150" fill="#a9bfd1" font-family="Inter,Arial,sans-serif" font-size="24">Each path has a trigger, a tool boundary, and a reviewable result.</text>
  <g stroke="#6bd0b5" stroke-width="3" opacity=".7" fill="none">
    <path d="M800 430 L300 280"/><path d="M800 430 L300 620"/><path d="M800 430 L1300 280"/><path d="M800 430 L1300 620"/><path d="M800 430 L800 730"/>
  </g>
  <g transform="translate(610 330)">
    <rect width="380" height="205" rx="28" fill="#183347" stroke="#6bd0b5" stroke-width="3"/>
    <text x="190" y="78" text-anchor="middle" fill="#e9fff8" font-family="Inter,Arial,sans-serif" font-size="35" font-weight="750">HERMES</text>
    <text x="190" y="122" text-anchor="middle" fill="#b9d8d0" font-family="Inter,Arial,sans-serif" font-size="23">memory · skills · profiles</text>
    <text x="190" y="160" text-anchor="middle" fill="#b9d8d0" font-family="Inter,Arial,sans-serif" font-size="23">guardrails · delivery</text>
  </g>
  <g font-family="Inter,Arial,sans-serif">
    <g transform="translate(100 210)"><rect width="400" height="145" rx="22" fill="#16283b" stroke="#365571"/><text x="30" y="54" fill="#f2f7ff" font-size="28" font-weight="700">ARR operations</text><text x="30" y="95" fill="#a9bfd1" font-size="21">Sonarr · Radarr · requests</text></g>
    <g transform="translate(100 550)"><rect width="400" height="145" rx="22" fill="#16283b" stroke="#365571"/><text x="30" y="54" fill="#f2f7ff" font-size="28" font-weight="700">Coding tasks</text><text x="30" y="95" fill="#a9bfd1" font-size="21">small changes · checks · review</text></g>
    <g transform="translate(1100 210)"><rect width="400" height="145" rx="22" fill="#16283b" stroke="#365571"/><text x="30" y="54" fill="#f2f7ff" font-size="28" font-weight="700">DeepResearch</text><text x="30" y="95" fill="#a9bfd1" font-size="21">search · read · synthesize</text></g>
    <g transform="translate(1100 550)"><rect width="400" height="145" rx="22" fill="#16283b" stroke="#365571"/><text x="30" y="54" fill="#f2f7ff" font-size="28" font-weight="700">Camofox / Chromium</text><text x="30" y="95" fill="#a9bfd1" font-size="21">browser fallback · Google search</text></g>
    <g transform="translate(500 740)"><rect width="600" height="90" rx="45" fill="#244337" stroke="#6bd0b5"/><text x="300" y="56" text-anchor="middle" fill="#dffaf1" font-size="26" font-weight="700">Home Assistant · planned next</text></g>
  </g>
</svg>
