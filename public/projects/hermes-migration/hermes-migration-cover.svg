<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes migration control plane</title>
  <desc id="desc">A dark architectural illustration showing an orchestration node on GX10 connected to a NAS media stack through a private network.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#182b42"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#77e0c3"/>
      <stop offset="1" stop-color="#63a7ff"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="430" cy="390" r="250" fill="#62d9b7" opacity=".12" filter="url(#blur)"/>
  <circle cx="1210" cy="520" r="260" fill="#5c9dff" opacity=".12" filter="url(#blur)"/>
  <path d="M180 688 C450 480 610 520 810 450 S1160 360 1430 190" fill="none" stroke="url(#glow)" stroke-width="3" opacity=".75"/>
  <path d="M180 718 C450 510 610 550 810 480 S1160 390 1430 220" fill="none" stroke="#fff" stroke-width="1" opacity=".18" stroke-dasharray="8 14"/>
  <g transform="translate(170 250)">
    <rect width="520" height="300" rx="28" fill="#111d2e" stroke="#77e0c3" stroke-width="2"/>
    <rect x="30" y="30" width="460" height="68" rx="16" fill="#1b3042"/>
    <circle cx="67" cy="64" r="11" fill="#77e0c3"/>
    <text x="96" y="73" fill="#f2f7ff" font-family="Inter,Arial,sans-serif" font-size="31" font-weight="700">HERMES / GX10</text>
    <text x="38" y="152" fill="#b7c9d8" font-family="Inter,Arial,sans-serif" font-size="22">memory · skills · models</text>
    <text x="38" y="193" fill="#b7c9d8" font-family="Inter,Arial,sans-serif" font-size="22">DeepPlan · DeepResearch</text>
    <text x="38" y="234" fill="#b7c9d8" font-family="Inter,Arial,sans-serif" font-size="22">Camofox · coding · orchestration</text>
  </g>
  <g transform="translate(965 390)">
    <rect width="450" height="260" rx="28" fill="#111d2e" stroke="#63a7ff" stroke-width="2"/>
    <rect x="30" y="30" width="390" height="68" rx="16" fill="#1b3042"/>
    <circle cx="67" cy="64" r="11" fill="#63a7ff"/>
    <text x="96" y="73" fill="#f2f7ff" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="700">VKSNAS</text>
    <text x="38" y="150" fill="#b7c9d8" font-family="Inter,Arial,sans-serif" font-size="22">ARR stack · storage</text>
    <text x="38" y="191" fill="#b7c9d8" font-family="Inter,Arial,sans-serif" font-size="22">media services · Docker</text>
  </g>
  <g transform="translate(680 90)">
    <rect width="300" height="82" rx="41" fill="#0f1a2a" stroke="#77e0c3" stroke-width="2"/>
    <text x="150" y="52" text-anchor="middle" fill="#d5f5eb" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700">ZERO TIER PATH</text>
  </g>
  <text x="170" y="790" fill="#f2f7ff" font-family="Inter,Arial,sans-serif" font-size="54" font-weight="700">Move the control plane.</text>
  <text x="174" y="842" fill="#a9bfd1" font-family="Inter,Arial,sans-serif" font-size="27">Keep the data where it belongs.</text>
</svg>
